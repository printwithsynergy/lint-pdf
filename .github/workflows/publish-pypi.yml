name: publish-pypi

# Publishes the lintpdf package to PyPI when a v*.*.* tag is pushed.
#
# Auth: PyPI Trusted Publishers (OIDC) — no API token in secrets.
# Configure once at https://pypi.org/manage/account/publishing/ with:
#   - PyPI project: lintpdf
#   - Owner:        printwithsynergy
#   - Repository:   lint-pdf
#   - Workflow:     publish-pypi.yml
#   - Environment:  release
#
# Beta / pre-release tags (e.g. v0.1.0b1, v0.1.0rc1) follow PEP 440 and
# are honored by both the v*.*.* trigger glob and PyPI's pre-release
# classifier.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel --outdir dist/

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/lintpdf/
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
