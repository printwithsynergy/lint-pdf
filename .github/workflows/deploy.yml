name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Deploy Engine API to Railway ───────────────────────────
  deploy-api:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy API service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service lintpdf-api --dir packages/engine

  # ─── Deploy Celery Workers to Railway ───────────────────────
  deploy-worker-default:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Use worker config
        run: cp packages/engine/railway.worker.toml packages/engine/railway.toml
      - name: Deploy default queue worker
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service lintpdf-worker-default --dir packages/engine

  deploy-worker-priority:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Use priority worker config
        run: cp packages/engine/railway.worker-priority.toml packages/engine/railway.toml
      - name: Deploy priority queue worker
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service lintpdf-worker-priority --dir packages/engine

  deploy-worker-webhooks:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Use webhooks worker config
        run: cp packages/engine/railway.worker-webhooks.toml packages/engine/railway.toml
      - name: Deploy webhooks queue worker
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service lintpdf-worker-webhooks --dir packages/engine

  deploy-beat:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Use beat config
        run: cp packages/engine/railway.beat.toml packages/engine/railway.toml
      - name: Deploy beat scheduler
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service lintpdf-beat --dir packages/engine

  # ─── Deploy Marketing Site ──────────────────────────────────
  deploy-web:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web
        run: pnpm --filter @thinkneverland/lintpdf-web build
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service lintpdf-web --dir packages/web

  # ─── Deploy App Dashboard ──────────────────────────────────
  deploy-app:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build app
        run: pnpm --filter @thinkneverland/lintpdf-app build
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service app --dir packages/app

  # ─── Deploy Inference Service to Modal ─────────────────────────
  deploy-inference:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Modal CLI
        run: pip install "modal>=0.64.0"
      - name: Ensure Modal secret exists
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal secret create lintpdf-inference-secrets MODEL_CACHE_DIR=/models DEVICE=cuda MAX_IMAGE_SIZE=4096 --force
      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        working-directory: packages/inference
        run: modal deploy src/inference_service/modal_deploy.py

  # ─── Run Alembic migrations ─────────────────────────────────
  migrate:
    needs: [deploy-api]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        working-directory: packages/engine
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run migrations
        working-directory: packages/engine
        env:
          LINTPDF_DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head
