name: CI — Build Verification

on:
  push:
    branches: [main]
    paths-ignore: ['*.md', 'docs/**', '.vscode/**', '.atlas/**', '.thinkneverland/**', 'LICENSE']
  pull_request:
    branches: [main]
    paths-ignore: ['*.md', 'docs/**', '.vscode/**', '.atlas/**', '.thinkneverland/**', 'LICENSE']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Lint, typecheck, format, tests, and semgrep all run locally via git hooks
# (pre-commit + pre-push). CI only verifies the build succeeds so Railway
# deploys don't fail on missing imports or compilation errors.

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
      node: ${{ steps.filter.outputs.node }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed packages
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD 2>/dev/null || echo ".github/workflows/ci.yml")
          echo "engine=$( echo "$CHANGED" | grep -qE '^packages/engine/' && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "node=$( echo "$CHANGED" | grep -qE '^packages/(app|web|plugin|stripe)/' && echo true || echo false )" >> "$GITHUB_OUTPUT"

  engine-build:
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Verify engine installs cleanly
        run: |
          python -m pip install --upgrade pip
          pip install -e .

  node-build:
    needs: changes
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pnpm install --no-frozen-lockfile
      - name: Build plugin
        run: pnpm --filter @thinkneverland/grounded-plugin build
      - name: Build stripe
        run: pnpm --filter @lintpdf/stripe build
      - name: Generate Prisma client
        run: pnpm --filter @thinkneverland/lintpdf-app db:generate
      - name: Build app
        run: pnpm --filter @thinkneverland/lintpdf-app build
