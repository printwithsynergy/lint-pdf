name: Modal deploy

# Deploys the Modal inference app whenever packages/inference/ changes
# on main. Modal doesn't auto-deploy from GitHub the way Railway does;
# without this workflow, a merged PR that bumps max_containers or
# ships new model code only takes effect after a human runs
# `modal deploy` locally.
#
# Required repo secrets:
#   MODAL_TOKEN_ID       — Modal account token ID
#   MODAL_TOKEN_SECRET   — Modal account token secret
# Both are also available as local-dev env vars; same values work.

on:
  push:
    branches: [main]
    paths:
      - "packages/inference/**"
      - ".github/workflows/modal-deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: modal-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install modal

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        working-directory: packages/inference
        run: |
          modal deploy src/inference_service/modal_deploy.py
