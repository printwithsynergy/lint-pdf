name: Desktop Release

# Builds macOS (universal), Windows, and Linux bundles for
# packages/desktop when a `desktop-v*` tag is pushed, and attaches them
# to a GitHub Release along with the `latest.json` manifest that
# tauri-plugin-updater reads.
#
# Required secrets (see packages/desktop/RELEASING.md):
#   TAURI_SIGNING_PRIVATE_KEY            — generated by `pnpm tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   — password for the key above
#
# Optional (macOS notarisation — builds still succeed without these,
# but Gatekeeper will warn the first time users launch the app):
#   APPLE_CERTIFICATE                    — base64-encoded .p12
#   APPLE_CERTIFICATE_PASSWORD
#   APPLE_SIGNING_IDENTITY               — e.g. "Developer ID Application: Example (TEAMID)"
#   APPLE_ID
#   APPLE_TEAM_ID
#   APPLE_PASSWORD                       — app-specific password

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            rust-target: "universal-apple-darwin"
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            rust-target: "x86_64-unknown-linux-gnu"
            args: ""
          - platform: windows-latest
            rust-target: "x86_64-pc-windows-msvc"
            args: ""

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: packages/desktop

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend deps
        run: pnpm install --ignore-workspace

      - name: Import Apple signing certificate
        if: matrix.platform == 'macos-14' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions build.keychain

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "LintPDF Hot Folders ${{ github.ref_name }}"
          releaseBody: |
            See the [desktop app docs](https://lintpdf.com/docs/desktop-app) for install instructions.

            Auto-update: existing installs receive this release automatically via `latest.json`.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
