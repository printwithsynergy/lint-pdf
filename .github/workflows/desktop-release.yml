name: Desktop Release

# Builds macOS (universal), Windows, and Linux bundles for
# packages/desktop when a `desktop-v*` tag is pushed, attaches them to a
# GitHub Release (for the tauri-plugin-updater `latest.json` flow), and
# also uploads the installers to Cloudflare R2 under
# `desktop-releases/<version>/` so licensed tenants can download them
# from the in-app `/dashboard/downloads` page.
#
# Required secrets (see packages/desktop/RELEASING.md and RELEASING-R2.md):
#   TAURI_SIGNING_PRIVATE_KEY            — generated by `pnpm tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   — password for the key above
#
# Required secrets for R2 upload:
#   R2_ENDPOINT_URL                      — https://<accountid>.r2.cloudflarestorage.com
#   R2_ACCESS_KEY_ID                     — R2 API token access key
#   R2_SECRET_ACCESS_KEY                 — R2 API token secret
#   R2_BUCKET_NAME                       — defaults to `lintpdf-uploads` if unset
#
# Optional (macOS notarisation — builds still succeed without these,
# but Gatekeeper will warn the first time users launch the app):
#   APPLE_CERTIFICATE                    — base64-encoded .p12
#   APPLE_CERTIFICATE_PASSWORD
#   APPLE_SIGNING_IDENTITY               — e.g. "Developer ID Application: Example (TEAMID)"
#   APPLE_ID
#   APPLE_TEAM_ID
#   APPLE_PASSWORD                       — app-specific password

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            # ``universal-apple-darwin`` is a Tauri-level alias, NOT a real
            # rustup target — install both arch targets and let
            # tauri-action lipo them together via ``--target``.
            rust-target: "aarch64-apple-darwin x86_64-apple-darwin"
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            rust-target: "x86_64-unknown-linux-gnu"
            args: ""
          - platform: windows-latest
            rust-target: "x86_64-pc-windows-msvc"
            args: ""

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: packages/desktop

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Ubuntu 22.04 ships a broken dependency chain for the legacy
          # ``libappindicator3-dev`` package (its ``libappindicator3-1``
          # dep conflicts with ``libayatana-appindicator3-dev`` that
          # Tauri 2.2 actually wants). Pull the ayatana fork only — it
          # provides the same tray-icon API surface Tauri links against.
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Setup pnpm
        # No explicit ``version`` — ``pnpm/action-setup@v4`` reads
        # ``packageManager`` from the root package.json (currently
        # ``pnpm@10.11.0``). Specifying both keys makes v4 error with
        # ``Multiple versions of pnpm specified`` and the whole matrix
        # fails at step 4.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend deps
        run: pnpm install --ignore-workspace

      - name: Import Apple signing certificate
        if: matrix.platform == 'macos-14' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions build.keychain

      - name: Build & release
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # When no Apple Developer cert is loaded into the runner keychain,
          # fall back to ad-hoc signing (``-``). Without this, Tauri's
          # bundler invokes ``codesign`` with the default identity, which
          # doesn't exist on a fresh GH Actions runner, and the macOS
          # build fails with "The specified item could not be found in
          # the keychain." Ad-hoc-signed bundles still run on macOS but
          # show the unidentified-developer prompt on first launch — fine
          # for an early release, swap to a real Developer ID secret
          # later for a polished install experience.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "LintPDF Hot Folders ${{ github.ref_name }}"
          releaseBody: |
            See the [desktop app docs](https://lintpdf.com/docs/desktop-app) for install instructions.

            Auto-update: existing installs receive this release automatically via `latest.json`.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # ── Upload bundles to Cloudflare R2 ────────────────────────────────
      # Each matrix job uploads only its own platform's installer. A final
      # `publish-manifest` job (below) composes the merged manifest.json
      # and overwrites latest.json — that avoids three jobs racing on the
      # same key.

      - name: Upload installers to R2
        if: success()
        working-directory: ${{ github.workspace }}
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${R2_ENDPOINT_URL:-}" || -z "${AWS_ACCESS_KEY_ID:-}" || -z "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "::warning::R2 secrets not configured — skipping R2 upload for this platform."
            exit 0
          fi
          BUCKET="${R2_BUCKET_NAME:-lintpdf-uploads}"
          VERSION="${REF_NAME#desktop-v}"
          BASE="packages/desktop/src-tauri/target"

          # Which subpath holds the artifacts depends on the --target flag
          # passed to Tauri. Collect candidates; glob returns nothing when
          # the dir is absent, which is fine.
          shopt -s nullglob

          upload_one() {
            local subdir="$1"
            local file="$2"
            local filename; filename="$(basename "$file")"
            local key="desktop-releases/${VERSION}/${subdir}/${filename}"
            echo "Uploading $file -> s3://${BUCKET}/${key}"
            aws s3 cp --endpoint-url "$R2_ENDPOINT_URL" "$file" "s3://${BUCKET}/${key}" --only-show-errors
          }

          for f in "$BASE"/universal-apple-darwin/release/bundle/dmg/*.dmg; do
            upload_one macos "$f"
          done
          for f in "$BASE"/release/bundle/dmg/*.dmg; do
            upload_one macos "$f"
          done
          for f in "$BASE"/release/bundle/appimage/*.AppImage; do
            upload_one linux "$f"
          done
          for f in "$BASE"/release/bundle/deb/*.deb; do
            upload_one linux "$f"
          done
          for f in "$BASE"/release/bundle/msi/*.msi; do
            upload_one windows "$f"
          done
          for f in "$BASE"/x86_64-pc-windows-msvc/release/bundle/msi/*.msi; do
            upload_one windows "$f"
          done

  publish-manifest:
    needs: release
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compose & upload manifest to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${R2_ENDPOINT_URL:-}" || -z "${AWS_ACCESS_KEY_ID:-}" || -z "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "::warning::R2 secrets not configured — skipping manifest publish."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y jq
          BUCKET="${R2_BUCKET_NAME:-lintpdf-uploads}"
          VERSION="${REF_NAME#desktop-v}"
          PREFIX="desktop-releases/${VERSION}/"
          NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${REF_NAME}"
          RELEASED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Discover uploaded artifacts by listing the version prefix.
          # Map files to logical platform names.
          platforms='{}'
          while read -r line; do
            # Each line looks like:  2026-04-16 12:34:56    1234567 desktop-releases/0.4.2/macos/foo.dmg
            key="${line##* }"
            size="$(awk '{print $3}' <<<"$line")"
            [[ -z "$key" || "$key" == */manifest.json ]] && continue
            filename="${key##*/}"
            subdir_and_file="${key#${PREFIX}}"
            subdir="${subdir_and_file%%/*}"
            case "$filename" in
              *.dmg)      plat=macos ;;
              *.msi)      plat=windows ;;
              *.AppImage) plat=linux_appimage ;;
              *.deb)      plat=linux_deb ;;
              *) continue ;;
            esac

            # Pull the object's sha256 from R2 (ChecksumSHA256 is base64;
            # we'll fall back to computing it client-side for consistency).
            tmpfile="$(mktemp)"
            aws s3 cp --endpoint-url "$R2_ENDPOINT_URL" "s3://${BUCKET}/${key}" "$tmpfile" --only-show-errors
            sha="$(sha256sum "$tmpfile" | awk '{print $1}')"
            rm -f "$tmpfile"

            platforms="$(jq \
              --arg p "$plat" \
              --arg fn "$filename" \
              --argjson size "$size" \
              --arg sha "$sha" \
              --arg key "$key" \
              '. + {($p): {filename: $fn, size: $size, sha256: $sha, key: $key}}' \
              <<<"$platforms")"
          done < <(aws s3 ls --endpoint-url "$R2_ENDPOINT_URL" --recursive "s3://${BUCKET}/${PREFIX}")

          manifest="$(jq -n \
            --arg version "$VERSION" \
            --arg released_at "$RELEASED_AT" \
            --arg notes_url "$NOTES_URL" \
            --argjson platforms "$platforms" \
            '{version:$version, released_at:$released_at, notes_url:$notes_url, platforms:$platforms}')"

          echo "$manifest" | jq .

          manifest_file="$(mktemp)"
          printf '%s\n' "$manifest" > "$manifest_file"
          aws s3 cp --endpoint-url "$R2_ENDPOINT_URL" \
            --content-type application/json \
            "$manifest_file" \
            "s3://${BUCKET}/desktop-releases/${VERSION}/manifest.json" \
            --only-show-errors

          latest_file="$(mktemp)"
          jq -n \
            --arg version "$VERSION" \
            --arg manifest_key "desktop-releases/${VERSION}/manifest.json" \
            '{version:$version, manifest_key:$manifest_key}' > "$latest_file"
          aws s3 cp --endpoint-url "$R2_ENDPOINT_URL" \
            --content-type application/json \
            "$latest_file" \
            "s3://${BUCKET}/desktop-releases/latest.json" \
            --only-show-errors

          echo "Manifest published for version ${VERSION}."
