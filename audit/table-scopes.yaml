# Table-scope classification for the engine ↔ SaaS split (W7).
#
# Single source of truth for which Postgres tables are owned by the
# OSS engine vs the SaaS shell. Used by:
#
# - ``scripts/check_migration_scope.py`` — CI tripwire that fails if a
#   new alembic migration touches tables across scopes.
# - The future alembic split: engine alembic stream owns ``engine``
#   tables; SaaS alembic stream owns ``saas`` tables.
#
# Conventions:
#
# - ``engine`` — table has an ORM model on a ``lintpdf.*`` Base.
#   Schema changes belong in OSS alembic (``printwithsynergy/lint-pdf``).
# - ``saas`` — table has an ORM model on the ``lintpdf_saas.api.models.Base``.
#   Schema changes belong in SaaS alembic (``thinkneverland/lint-pdf-saas``).
# - ``orphan`` — table created by alembic history but no current ORM
#   model on either side. Either deprecated, raw-SQL-only, or missed
#   during the W6 extraction. Audit follow-up tracked separately.
#
# Tables NOT listed here will fail the tripwire — every new table must
# be classified.

engine:
  # OSS lintpdf.api.models.Base — core preflight engine
  - brand_profiles
  - corpus_assays
  - corpus_run_assays
  - corpus_runs
  - job_findings
  - job_imported_reports
  - jobs
  - report_tokens
  - system_profiles
  - tenants
  - viewer_annotation_comments
  - viewer_annotations
  - webhook_deliveries
  - webhook_endpoints

  # OSS lintpdf.tenants.toggle_models.Base — Phase 0.7 unified config
  - workflows
  - toggles
  - toggle_overrides
  - resolved_config_snapshots
  - toggle_audit_log

  # OSS lintpdf.decisions.models.Base — pre-flight decision audit
  - lintpdf_decisions

  # Engine-only raw-SQL tables (no ORM model -- accessed via direct
  # SELECT/INSERT in beat-scheduled tasks). The only consumer is the
  # OSS engine package's queue/audit_tasks.py.
  - ai_audit_rerun_queue        # beat-driven AI audit rerun queue
                                # (lintpdf.queue.audit_tasks.drain_ai_audit_rerun_queue)

saas:
  # lintpdf_saas.api.models.Base — SaaS-only billing / tenancy
  - ai_usage_logs
  - api_keys
  - approval_chains
  - approval_steps
  - plan_limit_overrides
  - share_link_visitors
  - tenant_ai_configs
  - tenant_ai_credit_packages
  - tenant_color_configs
  - trial_files
  - trial_submissions
  - user_ai_access

orphan:
  # Already dropped from production. Listed here so the
  # migration-scope tripwire accepts the historical create/drop
  # pairs in alembic history without flagging them as unclassified.
  #
  # Dropped by alembic 053 -- the orphan-tables audit follow-up:
  - waitlist_entries            # Pre-launch waitlist sign-up table.
                                # Created by alembic 003 but the
                                # flow ended up on the marketing
                                # site (``packages/web``) and the
                                # table was never wired up.

  # Dropped by alembic 046 -- Phase 0.7 PR-B4-final. The legacy-fold
  # (v13) migrated their data to ToggleOverride / Workflow rows;
  # alembic 046 dropped the now-empty source tables:
  - custom_profiles
  - brand_specs
  - approval_chain_templates
  - tenant_import_mappings

  # Dropped by alembic 047 -- Workflow-rows-rewrite of the legacy
  # custom-endpoint submission flow:
  - custom_endpoints
