[build]
builder = "DOCKERFILE"
dockerfilePath = "packages/engine/Dockerfile"
# Only rebuild on engine changes. See railway.worker.toml.
watchPatterns = [
    "packages/engine/**",
    "pnpm-workspace.yaml",
    "package.json",
]

[deploy]
numReplicas = 1
startCommand = "sh -c 'celery -A lintpdf.queue.worker worker --loglevel=info --queues=priority --concurrency=${CELERY_PRIORITY_CONCURRENCY:-2}'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
gracefulShutdownTimeoutSec = 660
