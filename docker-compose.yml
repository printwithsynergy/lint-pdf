services:
  # --- LintPDF API ---
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - LINTPDF_DATABASE_URL=postgresql://lintpdf:lintpdf@postgres:5432/lintpdf
      - DATABASE_URL=postgresql://lintpdf:lintpdf@postgres:5432/lintpdf
      - LINTPDF_REDIS_URL=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
      - LINTPDF_VERAPDF_URL=http://verapdf:8080
      - LINTPDF_CLAMAV_URL=clamav:3310
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      verapdf:
        condition: service_started
      clamav:
        condition: service_healthy
    volumes:
      - ./src:/app/src  # Hot reload in dev

  # --- Celery Workers ---
  worker-default:
    build: .
    command: celery -A siftpdf.queue.worker worker --loglevel=info --queues=default --concurrency=${CELERY_DEFAULT_CONCURRENCY:-2}
    env_file: .env
    environment:
      - LINTPDF_DATABASE_URL=postgresql://lintpdf:lintpdf@postgres:5432/lintpdf
      - DATABASE_URL=postgresql://lintpdf:lintpdf@postgres:5432/lintpdf
      - LINTPDF_REDIS_URL=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
      - LINTPDF_VERAPDF_URL=http://verapdf:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      verapdf:
        condition: service_started

  worker-priority:
    build: .
    command: celery -A siftpdf.queue.worker worker --loglevel=info --queues=priority --concurrency=${CELERY_PRIORITY_CONCURRENCY:-2}
    env_file: .env
    environment:
      - LINTPDF_DATABASE_URL=postgresql://lintpdf:lintpdf@postgres:5432/lintpdf
      - DATABASE_URL=postgresql://lintpdf:lintpdf@postgres:5432/lintpdf
      - LINTPDF_REDIS_URL=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
      - LINTPDF_VERAPDF_URL=http://verapdf:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      verapdf:
        condition: service_started

  worker-ai:
    build: .
    # Dedicated worker for AI-enabled jobs. Concurrency tracks Modal's
    # max_containers. Isolated so AI backlog can't head-of-line-block
    # deterministic jobs. Mirrors packages/engine/railway.worker-ai.toml.
    command: celery -A siftpdf.queue.worker worker --loglevel=info --queues=ai_heavy --concurrency=${CELERY_AI_CONCURRENCY:-6}
    env_file: .env
    environment:
      - LINTPDF_DATABASE_URL=postgresql://lintpdf:lintpdf@postgres:5432/lintpdf
      - DATABASE_URL=postgresql://lintpdf:lintpdf@postgres:5432/lintpdf
      - LINTPDF_REDIS_URL=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
      - LINTPDF_VERAPDF_URL=http://verapdf:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      verapdf:
        condition: service_started

  worker-webhooks:
    build: .
    command: celery -A siftpdf.queue.worker worker --loglevel=info --queues=webhooks --concurrency=${CELERY_WEBHOOK_CONCURRENCY:-4}
    env_file: .env
    environment:
      - LINTPDF_DATABASE_URL=postgresql://lintpdf:lintpdf@postgres:5432/lintpdf
      - DATABASE_URL=postgresql://lintpdf:lintpdf@postgres:5432/lintpdf
      - LINTPDF_REDIS_URL=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A siftpdf.queue.worker beat --loglevel=info
    env_file: .env
    environment:
      - LINTPDF_DATABASE_URL=postgresql://lintpdf:lintpdf@postgres:5432/lintpdf
      - DATABASE_URL=postgresql://lintpdf:lintpdf@postgres:5432/lintpdf
      - LINTPDF_REDIS_URL=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lintpdf
      POSTGRES_PASSWORD: lintpdf
      POSTGRES_DB: lintpdf
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lintpdf"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- veraPDF (PDF/A validation sidecar) ---
  verapdf:
    image: verapdf/rest:latest
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: "-Xmx512m"

  # --- ClamAV (virus scanning sidecar) ---
  # Required by upload_security.scan_for_malware — endpoints fail-closed
  # if this is unreachable. The first start downloads signatures and can
  # take a minute or two; healthcheck gates dependent services until ready.
  clamav:
    image: clamav/clamav:stable
    ports:
      - "3310:3310"
    environment:
      CLAMAV_NO_MILTERD: "true"
      CLAMAV_NO_FRESHCLAMD: "false"
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

volumes:
  pgdata:
