# LintPDF E2E Testing — Full Stack Docker Compose
#
# Runs all services locally for Playwright e2e testing.
# Usage: docker compose -f docker-compose.e2e.yml up --build --abort-on-container-exit --exit-code-from playwright
#
# Stripe tests auto-skip (no STRIPE_SECRET_KEY set).
# All other tests run against local PostgreSQL, Redis, veraPDF, engine API, and Next.js app.

services:
  # ── Infrastructure ──────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lintpdf_test
      POSTGRES_USER: lintpdf
      POSTGRES_PASSWORD: lintpdf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lintpdf -d lintpdf_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  verapdf:
    image: verapdf/rest:latest
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/info"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Engine Services ─────────────────────────────────

  engine:
    build:
      context: packages/engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      verapdf:
        condition: service_healthy
    environment:
      LINTPDF_DATABASE_URL: postgresql://lintpdf:lintpdf@postgres:5432/lintpdf_test
      LINTPDF_REDIS_URL: redis://redis:6379/0
      LINTPDF_VERAPDF_URL: http://verapdf:8080
      LINTPDF_STORAGE_BACKEND: local
      LINTPDF_STORAGE_LOCAL_DIR: /tmp/lintpdf-storage
      DEV_AUTH_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  worker:
    build:
      context: packages/engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      LINTPDF_DATABASE_URL: postgresql://lintpdf:lintpdf@postgres:5432/lintpdf_test
      LINTPDF_REDIS_URL: redis://redis:6379/0
      LINTPDF_VERAPDF_URL: http://verapdf:8080
      LINTPDF_STORAGE_BACKEND: local
      LINTPDF_STORAGE_LOCAL_DIR: /tmp/lintpdf-storage
    command: celery -A lintpdf.queue.celery_app worker -l info -Q default,priority,webhooks -c 2

  # ── App Dashboard ───────────────────────────────────

  app:
    build:
      context: .
      dockerfile: packages/app/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    depends_on:
      engine:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lintpdf:lintpdf@postgres:5432/lintpdf_test
      LINTPDF_API_URL: http://engine:8000
      LINTPDF_API_KEY: e2e-test-key
      LINTPDF_ADMIN_API_KEY: e2e-admin-key
      MCP_BACKDOOR: "true"
      MCP_SECRET_KEY: e2e-test-secret
      NODE_ENV: test
      APP_URL: http://app:8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/auth/login"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

  # ── Playwright Test Runner ──────────────────────────

  playwright:
    image: mcr.microsoft.com/playwright:v1.49.0-noble
    depends_on:
      app:
        condition: service_healthy
      engine:
        condition: service_healthy
    working_dir: /work
    volumes:
      - .:/work:ro
      - ./playwright-report:/work/playwright-report
    environment:
      APP_BASE_URL: http://app:8080
      API_BASE_URL: http://engine:8000
      WEB_BASE_URL: http://app:8080
      MCP_SECRET_KEY: e2e-test-secret
      ADMIN_API_KEY: e2e-admin-key
      # No STRIPE_SECRET_KEY — Stripe tests auto-skip
    command: >
      sh -c "
        npm install -g pnpm@9 &&
        cd /work &&
        pnpm install --no-frozen-lockfile --ignore-scripts 2>/dev/null &&
        npx playwright install --with-deps chromium &&
        npx playwright test --reporter=list 2>&1;
        EXIT_CODE=$$?;
        echo '';
        if [ $$EXIT_CODE -eq 0 ]; then
          echo '=== ALL E2E TESTS PASSED ===';
        else
          echo '=== E2E TESTS FAILED (exit code: '$$EXIT_CODE') ===';
        fi;
        exit $$EXIT_CODE
      "
