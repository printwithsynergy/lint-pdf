[package]
name = "lintpdf-mobile"
version = "0.1.0"
edition = "2021"
description = "LintPDF mobile companion app — interactive viewer + approval/rejection flows"

[lib]
name = "lintpdf_mobile_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "lintpdf-mobile"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["protocol-asset"] }
# Universal Links (iOS) + App Links (Android) — routes
# https://app.lintpdf.com/view/{token} and /approve/{token} taps into
# the running app via the deep-link plugin's Rust + JS event channel.
tauri-plugin-deep-link = "2"
# tauri-plugin-store — persists captured tenant + API key across app
# launches. On iOS the underlying file lives in the app sandbox
# Documents directory; on Android it's in the app's internal
# storage. Both are encrypted at rest by the OS.
tauri-plugin-store = "2"
tauri-plugin-dialog = "2"
tauri-plugin-notification = "2"
tauri-plugin-os = "2"
# Local push-token registration plugin. Lives in this workspace
# at plugins/lintpdf-push so the Swift / Kotlin code is part of
# the LintPDF source tree (no third-party plugin maturity risk).
lintpdf-push = { path = "plugins/lintpdf-push" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
