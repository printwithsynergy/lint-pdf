[build]
builder = "DOCKERFILE"
dockerfilePath = "packages/engine/Dockerfile"
# Only redeploy when the engine (or its direct Python deps) actually
# changes. Without this filter Railway redeploys the API on every main
# push (docs tweaks, stress-test scripts, root gitignore edits, etc.),
# which kills in-flight requests — including every stress-test run.
#
# `packages/inference/**` is intentionally EXCLUDED: inference code runs
# on Modal (see packages/inference/src/inference_service/modal_deploy.py)
# not on this Railway service, so a Modal-only change should never
# rebuild the API container. Keeping it in watchPatterns previously
# wedged a live tier-1 run when a Modal `max_containers` bump pushed.
watchPatterns = [
    "packages/engine/**",
    "pnpm-workspace.yaml",
    "package.json",
]

[deploy]
# Horizontal scale (bulk-files step 10): 3 replicas so a single hung
# container never takes the API down, and burst traffic (e.g. 100
# concurrent file uploads, your stated bulk-files shape) is spread
# across three containers instead of queued behind one. Each replica
# runs LINTPDF_WORKERS (8) Uvicorn workers → 24 workers total.
numReplicas = 3
healthcheckPath = "/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Graceful rolling deploys (step 15): keep the old replica serving
# traffic for `overlapSeconds` after the new one is healthy, and give
# the draining replica `drainingSeconds` to finish in-flight requests
# before SIGTERM. This stops the mid-upload kill pattern we saw on
# every redeploy during the tier-1 stress tests today.
#
# 60 s overlap matches Railway's recommended default for HTTP services
# and is well above p99 upload latency observed in tier-1 (~2 s per
# 20 MB PDF over the engine with streaming uploads).
overlapSeconds = 60
drainingSeconds = 120
# API uses the same Celery time_limit rationale as worker.toml — 600 s
# hard cap on any sync-ish handler. 660 s grace gives a 10 % buffer.
gracefulShutdownTimeoutSec = 660
