[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lintpdf"
version = "0.1.0"
description = "Detection-only PDF preflight engine"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "Think Neverland", email = "dev@thinkneverland.com" },
]

dependencies = [
    "pikepdf>=9.0.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "celery[redis]>=5.4.0",
    "redis>=5.0.0",
    "psycopg2-binary>=2.9.0",
    "sqlalchemy>=2.0.0",
    "alembic>=1.13.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.3.0",
    "httpx>=0.27.0",
    "weasyprint>=62.0",
    "jinja2>=3.1.0",
    "python-multipart>=0.0.9",
    "boto3>=1.34.0",
    "resend>=2.0.0",
    "defusedxml>=0.7.0",
    "filetype>=1.2.0",
    "clamd>=1.0.2",
]

[project.optional-dependencies]
ai = [
    "pyzbar>=0.1.9",
    "pylibdmtx>=0.1.10",
    "imagehash>=4.3.0",
    "colour-science>=0.4.0",
    "statsmodels>=0.14.0",
    "language-tool-python>=2.8",
    "fasttext-wheel>=0.9.2",
    "scikit-image>=0.22.0",
    "Pillow>=10.0.0",
    "pdf2image>=1.17.0",
    "anthropic>=0.30.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
    "httpx>=0.27.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/lintpdf"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "corpus: tests that require downloaded test corpus (deselect with '-m not corpus')",
    "slow: tests that take more than 10 seconds",
    "integration: tests that require external services (Redis, PostgreSQL, veraPDF)",
]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.13"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = false

[[tool.mypy.overrides]]
module = [
    "pikepdf.*",
    "celery.*",
    "weasyprint.*",
    "redis.*",
    "resend.*",
    "boto3.*",
    "defusedxml.*",
    "filetype.*",
    "clamd.*",
    "pyzbar.*",
    "pylibdmtx.*",
    "imagehash.*",
    "colour.*",
    "statsmodels.*",
    "language_tool_python.*",
    "fasttext.*",
    "skimage.*",
    "pdf2image.*",
    "anthropic.*",
    "scipy.*",
    "zxingcpp.*",
    "pyiqa.*",
    "nudenet.*",
    "ultralytics.*",
    "open_clip.*",
    "paddleocr.*",
    "numpy.*",
    "pytesseract.*",
    "botocore.*",
    "pydantic",
    "pydantic.*",
    "pydantic_settings",
    "pydantic_settings.*",
    "fastapi",
    "fastapi.*",
    "sqlalchemy",
    "sqlalchemy.*",
    "httpx",
    "httpx.*",
    "jinja2",
    "jinja2.*",
    "alembic",
    "alembic.*",
    "PIL",
    "PIL.*",
    "uvicorn",
    "uvicorn.*",
]
ignore_missing_imports = true

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.per-file-ignores]
# PDF operators use uppercase names (Q, Do, BT, ET, Tf, etc.) per ISO 32000-2
"src/lintpdf/semantic/interpreter.py" = ["N802"]
"tests/semantic/test_interpreter.py" = ["N802"]
# Test methods don't use self — grouped in classes for organization only
"tests/**" = ["PLR6301"]

[tool.ruff.lint.isort]
known-first-party = ["lintpdf"]

[tool.coverage.run]
source = ["src/lintpdf"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
skip_empty = true
fail_under = 80
