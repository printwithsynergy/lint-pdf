[build]
builder = "DOCKERFILE"
dockerfilePath = "packages/engine/Dockerfile"

[deploy]
numReplicas = 1
startCommand = "celery -A grounded.queue.worker worker --loglevel=info --queues=webhooks --concurrency=${CELERY_WEBHOOK_CONCURRENCY:-4}"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
