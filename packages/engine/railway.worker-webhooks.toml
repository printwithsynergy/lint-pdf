[build]
builder = "DOCKERFILE"
dockerfilePath = "packages/engine/Dockerfile"

[deploy]
numReplicas = 1
startCommand = "sh -c 'celery -A lintpdf.queue.worker worker --loglevel=info --queues=webhooks --concurrency=${CELERY_WEBHOOK_CONCURRENCY:-4}'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
