[build]
builder = "DOCKERFILE"
dockerfilePath = "packages/engine/Dockerfile"

[deploy]
# Dedicated Celery worker for AI-enabled jobs. Isolated from the main
# `default,priority` worker so AI-heavy jobs (which block on Modal GPU
# inference, currently capped at ~5 concurrent containers) can't starve
# deterministic-only jobs. See preflight-stress-results.md scaling
# defects — without this split, a backlog of AI jobs monopolised the
# Celery pool even when the bulk of work was CPU-bound.
#
# Concurrency should track Modal's ``max_containers`` + small buffer.
# Modal today is 5; we pick 6 so one worker slot can be queuing while
# the other five are executing. Raise once Modal is scaled up too.
numReplicas = 1
startCommand = "sh -c 'celery -A lintpdf.queue.worker worker --loglevel=info --queues=ai_heavy --concurrency=${CELERY_AI_CONCURRENCY:-6}'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
# Match other worker services — Celery task time_limit is 600s, give
# the pod 660s to drain in-flight GPU calls before SIGKILL.
gracefulShutdownTimeoutSec = 660
