[project]
name = "grounded-inference"
version = "0.1.0"
description = "Vision inference service for LintPDF AI features"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "python-multipart>=0.0.9",
    "Pillow>=10.0.0",
    "numpy>=1.24.0",
]

[project.optional-dependencies]
ml = [
    "pyiqa>=0.1.10",
    "transformers>=4.40.0",
    "torch>=2.0.0",
    "ultralytics>=8.0.0",
    "open-clip-torch>=2.24.0",
    "nudenet>=3.4.0",
    "paddleocr>=2.7.0",
    "modal>=0.64.0",
]
dev = ["pytest>=8.0.0", "pytest-cov>=5.0.0", "httpx>=0.27.0", "ruff>=0.4.0"]
mcp = ["mcp[cli]>=1.0.0"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["PLR6301"]
