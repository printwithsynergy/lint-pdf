[package]
name = "lintpdf-desktop"
version = "0.4.9"
edition = "2021"
description = "LintPDF Hot Folder Desktop App"

[lib]
name = "lintpdf_desktop_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[[bin]]
name = "lintpdf-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "protocol-asset"] }
tauri-plugin-dialog = "2"
tauri-plugin-notification = "2"
tauri-plugin-store = "2"
tauri-plugin-updater = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
notify = "7"
reqwest = { version = "0.12", features = ["multipart", "json"] }
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
rusqlite = { version = "0.32", features = ["bundled"] }
chrono = { version = "0.4", features = ["serde"] }
dirs = "6"
log = "0.4"
env_logger = "0.11"
# OS keyring for the API key — keeps the secret out of the plaintext
# config.json. Falls back gracefully to config.json when a keyring backend
# isn't available (e.g. Linux without a running D-Bus/Secret Service).
keyring = { version = "3", features = ["apple-native", "windows-native", "sync-secret-service"] }
url = "2"
urlencoding = "2"
filetime = "0.2"
sha2 = "0.10"
