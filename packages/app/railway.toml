[build]
builder = "RAILPACK"

[deploy]
startCommand = "echo '=== DEBUG: Environment Variables ===' && env | grep -E '(DATABASE|DIRECT)' && echo '=== DEBUG: Prisma Config ===' && cat prisma.config.ts && echo '=== DEBUG: Schema Directory ===' && ls -la prisma/ && echo '=== DEBUG: Running Prisma ===' && npx prisma db push --accept-data-loss && next start"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
