[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lintpdf"
version = "0.1.0"
description = "Python SDK for the LintPDF preflight API"
requires-python = ">=3.10"
dependencies = ["httpx>=0.24"]

[project.optional-dependencies]
dev = ["pytest", "pytest-httpx"]
