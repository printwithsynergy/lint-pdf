# Fly.io deployment for the LintPDF edge (Caddy + on-demand TLS).
#
# Customer hostnames (``reports.acme.com``, ``app.acme.com``, etc.)
# CNAME to this app's stable Fly.io hostname / anycast IP. Caddy
# requests LE certs on first request (gated by the engine's
# ``/api/v1/internal/on-demand-tls-check``) and proxies to Railway
# backends by URL path.

app = "lintpdf-edge"
primary_region = "ord"

[build]
dockerfile = "Dockerfile"

# NO ``[env]`` section here. ``LINTPDF_EDGE_SHARED_SECRET`` is injected
# as a Fly SECRET (``fly secrets set LINTPDF_EDGE_SHARED_SECRET=...``),
# NOT an env var. Putting a placeholder here caused flyctl deploy to
# bake the literal string "rotated-via-fly-secrets" into the machine
# config, overriding the real secret and breaking on-demand-TLS
# ask-endpoint authentication for every customer hostname.

# TLS cert + state. Caddy writes to /data; Fly's volume keeps it
# across restarts so we don't re-request certs on every cold start.
# (LE has per-registered-domain rate limits.)
[[mounts]]
source = "caddy_data"
destination = "/data"

# Public port 443 -> container 443 (raw TCP pass-through).
#
# ``handlers = []`` is CRITICAL: without this, Fly's default for any
# port-443 service is to inject ``handlers = ["tls"]``, which means
# Fly's edge terminates TLS itself using Fly-issued certs and forwards
# plaintext HTTP upstream. Caddy's on-demand TLS never sees the
# customer SNI and can't mint Let's Encrypt certs for BYO hostnames
# -- every handshake fails with ``TLSV1_ALERT_INTERNAL_ERROR``.
#
# With ``handlers = []`` Fly proxies the raw TCP stream through, so
# Caddy receives the real ClientHello + SNI and runs on-demand TLS
# as designed.
[[services]]
protocol = "tcp"
internal_port = 443

[[services.ports]]
port = 443
handlers = []

[services.concurrency]
type = "connections"
hard_limit = 1000
soft_limit = 800

[[services.tcp_checks]]
interval = "30s"
timeout = "5s"
grace_period = "10s"

# Platform health check on the HTTP port.
[[services]]
protocol = "tcp"
internal_port = 8080

[[services.http_checks]]
interval = "30s"
timeout = "5s"
grace_period = "10s"
method = "GET"
path = "/__edge/health"

# Single VM in ord to start. Bump later if cert renewal traffic or
# customer request volume warrants it.
[vm]
size = "shared-cpu-1x"
memory = "256mb"
