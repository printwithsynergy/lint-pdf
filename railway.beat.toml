[build]
builder = "DOCKERFILE"
dockerfilePath = "packages/engine/Dockerfile"
# Only rebuild on engine changes. See railway.worker.toml.
watchPatterns = [
    "packages/engine/**",
    "pnpm-workspace.yaml",
    "package.json",
]

[deploy]
numReplicas = 1
startCommand = "celery -A siftpdf.queue.worker beat --loglevel=info"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
